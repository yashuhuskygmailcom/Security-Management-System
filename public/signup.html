<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Security Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">✨</div>
            <h1>Create Account</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px; font-size: 14px;">
                Join the Security Management Platform
            </p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">📧 Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="role">👨‍💼 Select Role</label>
                    <select id="role" name="role" required>
                        <option value="">-- Choose Role --</option>
                        <option value="Admin">Admin</option>
                        <option value="Security Analyst">Security Analyst</option>
                        <option value="User">User</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">
                    📝 Create Account
                </button>
            </form>

            <div id="message" class="message" style="display: none; margin-top: 20px;"></div>

            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; text-align: center;">
                <p style="color: #666; font-size: 14px; margin-bottom: 12px;">Already have an account?</p>
                <a href="index.html" style="color: #667eea; text-decoration: none; font-weight: 600;">
                    🔐 Sign In Here
                </a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        Name: name,
                        Email: email,
                        Role: role
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Account created successfully! Redirecting to login...';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ ' + (data.error || 'Failed to create account');
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Error connecting to server';
                messageDiv.style.display = 'block';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
